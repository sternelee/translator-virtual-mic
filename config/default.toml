[audio]
input_sample_rate = 48000
internal_asr_rate = 16000
tts_output_rate = 48000
channels = 1
frame_ms = 20

[pipeline]
enable_vad = true
max_partial_latency_ms = 250
max_tts_buffer_ms = 300
fallback_mode = "bypass"

[languages]
source = "auto"
target = "en"

[translation]
provider = "openai_realtime"

[azure_voice_live]
endpoint = "https://your-resource.cognitiveservices.azure.com"
api_version = "2025-10-01"
model = "gpt-realtime"
api_key_env = "AZURE_VOICELIVE_API_KEY"
voice_name = "en-US-Ava:DragonHDLatestNeural"
voice_type = "azure-standard"
source_locale = "auto"
target_locale = "en-US"
enable_server_vad = true

[openai_realtime]
endpoint = "wss://api.openai.com/v1/realtime"
model = "gpt-realtime"
api_key_env = "OPENAI_API_KEY"
voice_name = "marin"
source_locale = "auto"
target_locale = "en-US"
enable_server_vad = true

# ElevenLabs pipeline (STT via Scribe, MT via configurable OpenAI-compatible endpoint, TTS via ElevenLabs).
# Swift host reads these from env vars; this section is informational.
#   ELEVENLABS_API_KEY        - required, used for Scribe STT and TTS
#   ELEVENLABS_VOICE_ID       - required, target voice for TTS
#   ELEVENLABS_MODEL_ID       - optional, default eleven_multilingual_v2
#   MT_BASE_URL               - optional, default https://api.openai.com/v1
#                               (e.g. https://openrouter.ai/api/v1, https://api.groq.com/openai/v1)
#   MT_MODEL                  - optional, default gpt-4o-mini
#   MT_API_KEY_ENV            - optional, default OPENAI_API_KEY (name of env var holding the key)
[elevenlabs]
mt_base_url = "https://api.openai.com/v1"
mt_model = "gpt-4o-mini"
mt_api_key_env = "OPENAI_API_KEY"

[local_stt]
enabled = false
model_id = "paraformer-zh"
model_dir = "~/Library/Application Support/translator-virtual-mic/models"
vad_model_path = "~/Library/Application Support/translator-virtual-mic/models/silero_vad.onnx"
vad_threshold = 0.5
language = "zh"
# Streaming partial caption tuning
partial_interval_ms = 500
max_partial_window_seconds = 5.0
overlap_tail_ms = 300
skip_partial_if_busy = true

[mt]
enabled = false
endpoint = "https://api.openai.com/v1/chat/completions"
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o-mini"
target_language = "en"

[virtual_device]
name = "Translator Virtual Mic"
preferred_sample_rate = 48000

[observability]
metrics_enabled = true
log_level = "info"
